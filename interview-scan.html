<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>面試工作人員掃碼</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="firebase-config.js"></script>
<style id="nav-css"></style>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--s:#161b22;--s2:#21262d;--b:#30363d;--ac:#58a6ff;--ac2:#bc8cff;--g:#3fb950;--y:#e3b341;--r:#f85149;--t:#e6edf3;--m:#8b949e}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lc{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:36px 28px;width:100%;max-width:380px;text-align:center}
.lc .ico{font-size:48px;margin-bottom:12px}
.lc h1{font-size:20px;font-weight:700;color:var(--ac2);margin-bottom:6px}
.lc p{color:var(--m);font-size:13px;margin-bottom:22px;line-height:1.6}
.pw-inp{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:11px 14px;color:var(--t);font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:.15em}
.pw-inp:focus{border-color:var(--ac2)}
.btn-login{width:100%;background:var(--ac2);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:.12s}
.btn-login:hover{filter:brightness(1.1)}
.err{color:var(--r);font-size:12px;margin-top:8px;display:none}
.wrap{max-width:520px;margin:0 auto;padding:16px}
.toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.room-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(188,140,255,.12);border:1px solid rgba(188,140,255,.3);color:var(--ac2);border-radius:20px;padding:6px 16px;font-size:14px;font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;background:var(--g);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.card{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:18px;margin-bottom:12px}
.ch2{font-size:11px;color:var(--m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:600}
.mtabs{display:flex;gap:6px;margin-bottom:14px}
.mtab{flex:1;padding:9px;border-radius:8px;background:var(--s2);border:1px solid var(--b);color:var(--m);cursor:pointer;text-align:center;font-size:12px;font-weight:500;transition:.12s}
.mtab.on{background:var(--ac2);color:#fff;border-color:var(--ac2)}
#reader{border-radius:10px;overflow:hidden}
.scan-btn{width:100%;margin-top:10px;cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:10px;padding:12px;font-size:14px;background:var(--ac2);color:#fff;transition:.12s}
.scan-btn:hover{filter:brightness(1.1)}
.stop-btn{width:100%;margin-top:6px;cursor:pointer;font-family:inherit;font-weight:500;border:1px solid var(--b);border-radius:10px;padding:9px;font-size:13px;background:transparent;color:var(--m)}
.manual-row{display:flex;gap:8px;margin-top:10px}
.manual-inp{flex:1;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:9px 12px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.manual-inp:focus{border-color:var(--ac2)}
.manual-btn{background:var(--ac2);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
/* 暫存區 */
.staged-empty{color:var(--m);font-size:12px;text-align:center;padding:14px 0}
.staged-item{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:10px 14px;margin-bottom:8px}
.staged-left{display:flex;align-items:center;gap:10px}
.staged-num{background:var(--ac2);color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:24px;text-align:center}
.staged-name{font-size:15px;font-weight:700}
.staged-sub{font-size:11px;color:var(--m);margin-top:1px}
.staged-remove{background:transparent;border:1px solid var(--b);color:var(--m);border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;transition:.12s}
.staged-remove:hover{border-color:var(--r);color:var(--r)}
.send-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;margin-top:4px}
.send-btn:hover{filter:brightness(1.1)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;filter:none}
.send-ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);border-radius:10px;padding:12px;text-align:center;color:var(--g);font-size:14px;font-weight:600;display:none;margin-bottom:8px}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:12px 22px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{border-color:var(--g);color:var(--g)}
.toast.warn{border-color:var(--y);color:var(--y)}
.toast.err{border-color:var(--r);color:var(--r)}
/* History */
.hi{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--s2);border-radius:8px;margin-top:6px;font-size:12px}
</style>
</head>
<body>

<!-- 登入頁 -->
<div class="lw" id="LP">
  <div class="lc">
    <div class="ico">🎤</div>
    <h1>面試工作人員掃碼</h1>
    <p>CM316 面試考場門口專用<br>請輸入您的面試工作人員密碼</p>
    <input class="pw-inp" type="password" id="pw" placeholder="輸入工作人員密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="err-login">密碼錯誤或無面試工作人員權限</div>
    <button class="btn-login" onclick="doLogin()">登入</button>
    <a href="index.html" style="display:block;margin-top:14px;font-size:12px;color:var(--m);text-decoration:none">← 返回管理後台</a>
  </div>
</div>

<!-- 主畫面 -->
<div id="APP" style="display:none">
  <div id="NAV"></div>
  <div class="wrap">
    <div class="toprow">
      <div>
        <div class="room-badge"><span class="dot"></span>🎤 CM316 面試考場</div>
        <div style="font-size:12px;color:var(--m);margin-top:6px" id="staff-label">—</div>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="refreshCache()" style="background:transparent;border:1px solid var(--b);color:var(--m);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:11px;font-family:inherit" id="refresh-btn">🔄 重整</button>
        <button onclick="doLogout()" style="background:transparent;border:1px solid var(--b);color:var(--m);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:11px;font-family:inherit">登出</button>
      </div>
    </div>

    <!-- 掃描區 -->
    <div class="card">
      <div class="ch2">📷 掃描 / 查詢考生</div>
      <div class="mtabs">
        <div class="mtab on" onclick="switchMode('camera',this)">📷 鏡頭掃描</div>
        <div class="mtab" onclick="switchMode('manual',this)">⌨️ 手動輸入</div>
      </div>
      <div id="mode-camera">
        <div id="reader"></div>
        <button class="scan-btn" id="start-btn" onclick="startScan()">▶ 開始掃描</button>
        <button class="stop-btn" id="stop-btn" style="display:none" onclick="stopScan()">■ 停止掃描</button>
      </div>
      <div id="mode-manual" style="display:none">
        <p style="font-size:12px;color:var(--m);margin-bottom:6px">輸入考生序號末三碼</p>
        <p style="font-size:11px;color:var(--r);margin-bottom:10px">⚠️ 精確比對：輸入 002 只會找到序號末三碼為 002 的考生</p>
        <div class="manual-row">
          <input class="manual-inp" id="manual-regno" placeholder="例：002" maxlength="3"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')"
            onkeydown="if(event.key==='Enter')processManualByRegNo()">
          <button class="manual-btn" onclick="processManualByRegNo()">加入</button>
        </div>
        <div id="manual-matches" style="display:none;margin-top:10px"></div>
        <div id="manual-err" style="display:none;color:var(--r);font-size:12px;margin-top:8px;padding:8px 10px;background:rgba(248,81,73,.08);border-radius:8px"></div>
      </div>
    </div>

    <!-- 本組暫存區 -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="ch2" style="margin-bottom:0">🗂️ 本組考生（<span id="staged-count">0</span> 人）</div>
        <button onclick="clearStaged()" style="background:transparent;border:1px solid var(--b);color:var(--m);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer">清空</button>
      </div>
      <p style="font-size:12px;color:var(--m);margin-bottom:12px;line-height:1.5">掃描或輸入考生後會加入此區，確認人選後再按推送</p>
      <div id="staged-list"><div class="staged-empty">尚未加入任何考生</div></div>
      <div class="send-ok" id="send-ok">✅ 已成功推送至面試老師評分頁面！</div>
      <button class="send-btn" id="send-btn" onclick="sendGroup()" disabled>🎤 推送這組考生至面試評分</button>
    </div>

    <!-- 推送記錄 -->
    <div class="card">
      <div class="ch2">📋 本次推送記錄</div>
      <div id="hist"><p style="color:var(--m);font-size:12px;text-align:center;padding:12px">尚無記錄</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.getElementById('nav-css').textContent = NAV_CSS;
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

let myName = '', scanner = null;
let candidatesCache = {};
let staged = [];
let hist = [];

// ── 登入：只允許 room === 'CM316' 的工作人員 ──────────
function doLogin() {
  const pw = document.getElementById('pw').value.trim();
  document.getElementById('err-login').style.display = 'none';

  db.ref('staff').orderByChild('password').equalTo(pw).once('value').then(snap => {
    const data = snap.val();
    if (data) {
      const staff = Object.values(data)[0];
      // 必須是 CM316 面試工作人員才能登入
      if (staff.room === 'CM316') {
        myName = staff.name;
        afterLogin();
        return;
      }
    }
    document.getElementById('err-login').style.display = 'block';
  }).catch(() => { document.getElementById('err-login').style.display = 'block'; });
}

function afterLogin() {
  document.getElementById('LP').style.display = 'none';
  document.getElementById('APP').style.display = 'block';
  document.getElementById('NAV').innerHTML = buildNav('interview-scan', myName + ' 工作人員', 'doLogout()');
  document.getElementById('staff-label').textContent = myName + ' 工作人員（CM316）';
  // 登入後一次性載入全量考生資料進快取
  db.ref('candidates').once('value').then(snap => {
    candidatesCache = snap.val() || {};
  });
  // 之後只監聽單筆異動，不推整個節點
  db.ref('candidates').on('child_changed', snap => {
    if (snap.key) candidatesCache[snap.key] = snap.val();
  });
  db.ref('candidates').on('child_removed', snap => {
    if (snap.key) delete candidatesCache[snap.key];
  });

}

function doLogout() {
  document.getElementById('APP').style.display = 'none';
  document.getElementById('LP').style.display = 'flex';
  document.getElementById('pw').value = '';
  myName = ''; staged = []; hist = [];
  db.ref('candidates').off('child_changed');
  db.ref('candidates').off('child_removed');
  if (scanner) stopScan();
  renderStaged(); renderHist();
}

function refreshCache() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent = '⏳ 更新中...'; btn.disabled = true; }
  db.ref('candidates').once('value').then(snap => {
    candidatesCache = snap.val() || {};
    if (btn) { btn.textContent = '✅ 已更新'; btn.disabled = false; setTimeout(() => { btn.textContent = '🔄 重整'; }, 1500); }
  }).catch(() => {
    if (btn) { btn.textContent = '❌ 失敗'; btn.disabled = false; setTimeout(() => { btn.textContent = '🔄 重整'; }, 1500); }
  });
}

// ── 掃描 ──────────────────────────────────────────────
function switchMode(m, el) {
  document.querySelectorAll('.mtab').forEach(t => t.classList.toggle('on', t === el));
  document.getElementById('mode-camera').style.display = m === 'camera' ? 'block' : 'none';
  document.getElementById('mode-manual').style.display = m === 'manual' ? 'block' : 'none';
  if (m !== 'camera' && scanner) stopScan();
}

function startScan() {
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'block';
  document.getElementById('reader').innerHTML = '';
  scanner = new Html5Qrcode('reader');
  scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 230, height: 230 } }, url => {
    const s = scanner; scanner = null;
    s.stop().catch(() => {}).finally(() => {
      document.getElementById('start-btn').style.display = 'block';
      document.getElementById('stop-btn').style.display = 'none';
      try {
        const id = new URL(url).searchParams.get('id');
        if (id) addToStaged(id);
        else showToast('QR碼無效', 'err');
      } catch (e) { showToast('QR碼格式錯誤', 'err'); }
    });
  }, () => {});
}

function stopScan() {
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display = 'none';
  if (!scanner) return Promise.resolve();
  const s = scanner; scanner = null;
  return s.stop().catch(() => {});
}

// ── 手動查詢 ──────────────────────────────────────────
function processManualByRegNo() {
  const q = document.getElementById('manual-regno').value.trim();
  document.getElementById('manual-err').style.display = 'none';
  document.getElementById('manual-matches').style.display = 'none';
  if (!q) return;

  const matched = Object.values(candidatesCache).filter(c => {
    const reg = String(c.regNo || '');
    return reg.length >= q.length && reg.slice(-q.length) === q;
  });

  if (!matched.length) {
    const err = document.getElementById('manual-err');
    err.textContent = `找不到序號末三碼為「${q}」的考生`;
    err.style.display = 'block';
    return;
  }
  if (matched.length === 1) {
    addToStaged(matched[0].id);
    document.getElementById('manual-regno').value = '';
    return;
  }
  const box = document.getElementById('manual-matches');
  box.style.display = 'block';
  box.innerHTML = `<p style="font-size:12px;color:var(--y);margin-bottom:8px">⚠️ 找到 ${matched.length} 筆，請選擇：</p>` +
    matched.map(c => `
      <div onclick="addToStaged('${c.id}');document.getElementById('manual-regno').value='';document.getElementById('manual-matches').style.display='none';"
        style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--s);border:1px solid var(--b);border-radius:8px;margin-bottom:6px;cursor:pointer"
        onmouseover="this.style.borderColor='var(--ac2)'" onmouseout="this.style.borderColor='var(--b)'">
        <div><strong style="font-size:14px">${c.name}</strong>
          <span style="color:var(--m);font-size:12px;margin-left:8px">序號 ${c.regNo}</span></div>
        <span style="color:var(--ac2);font-size:18px">›</span>
      </div>`).join('');
}

// ── 加入暫存 ──────────────────────────────────────────
function addToStaged(id) {
  const c = candidatesCache[id];
  if (!c) { showToast('找不到此考生', 'err'); return; }

  // 防重複：已在本組暫存區
  if (staged.find(s => s.id === id)) { showToast(`${c.name} 已在本組`, 'warn'); return; }

  // 防重複：已存在於 interviewQueue 任何尚未完成的 group
  db.ref('interviewQueue').orderByChild('createdAt').once('value').then(snap => {
    const groups = snap.val() || {};
    const alreadyQueued = Object.values(groups).some(g =>
      (g.candidates || []).some(cand => cand.id === id)
    );
    if (alreadyQueued) {
      if (!confirm(`⚠️ ${c.name} 已在面試佇列中（可能已被推送給老師）。
確定仍要加入本組？`)) return;
    }
    staged.push({
      id: c.id,
      name: c.name,
      regNo: String(c.regNo || ''),
      school: c.school || '',
      dept: c.dept || ''
    });
    showToast(`✅ 已加入：${c.name}`, 'ok');
    renderStaged();

    // 掃完繼續掃
    if (document.getElementById('mode-camera').style.display !== 'none') {
      setTimeout(() => startScan(), 600);
    }
  });
}

function removeFromStaged(id) {
  staged = staged.filter(s => s.id !== id);
  renderStaged();
}

function clearStaged() {
  if (!staged.length) return;
  if (!confirm('確定清空本組？')) return;
  staged = [];
  renderStaged();
}

// ── 渲染暫存區 ────────────────────────────────────────
function renderStaged() {
  const el = document.getElementById('staged-list');
  document.getElementById('staged-count').textContent = staged.length;
  document.getElementById('send-btn').disabled = staged.length === 0;
  if (!staged.length) {
    el.innerHTML = '<div class="staged-empty">尚未加入任何考生</div>';
    return;
  }
  el.innerHTML = staged.map((s, i) => `
    <div class="staged-item">
      <div class="staged-left">
        <span class="staged-num">#${i + 1}</span>
        <div>
          <div class="staged-name">${s.name}</div>
          <div class="staged-sub">序號 ${s.regNo}${s.school ? '　' + s.school : ''}</div>
        </div>
      </div>
      <button class="staged-remove" onclick="removeFromStaged('${s.id}')">移除</button>
    </div>`).join('');
}

// ── 推送至 Firebase interviewQueue ────────────────────
function sendGroup() {
  if (!staged.length) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '推送中...';

  const groupId = 'group_' + Date.now();
  const groupData = {
    groupId: groupId,
    createdAt: Date.now(),
    createdBy: myName,
    candidates: staged.map(s => ({
      id: s.id,
      name: s.name,
      regNo: s.regNo,
      school: s.school,
      dept: s.dept
    }))
  };

  db.ref('interviewQueue/' + groupId).set(groupData)
    .then(() => {
      // 記錄推送歷史
      hist.unshift({
        names: staged.map(s => s.name).join('、'),
        count: staged.length,
        time: new Date().toLocaleTimeString()
      });
      if (hist.length > 10) hist.pop();
      renderHist();

      // 清空暫存
      const sentCount = staged.length;
      staged = [];

      // 重新渲染（不影響 send-ok）
      document.getElementById('staged-count').textContent = '0';
      document.getElementById('staged-list').innerHTML = '<div class="staged-empty">尚未加入任何考生</div>';

      // 顯示成功訊息
      const ok = document.getElementById('send-ok');
      ok.style.display = 'block';
      setTimeout(() => { ok.style.display = 'none'; }, 5000);

      btn.textContent = '🎤 推送這組考生至面試評分';
      btn.disabled = true;  // 暫存已清空，禁用按鈕
      showToast('✅ 推送成功！', 'ok');
    })
    .catch(err => {
      btn.disabled = false;
      btn.textContent = '🎤 推送這組考生至面試評分';
      // 顯示詳細錯誤
      const msg = err ? (err.message || err.code || JSON.stringify(err)) : '未知錯誤';
      alert('❌ 推送失敗，原因：' + msg);
      showToast('推送失敗', 'err');
    });
}

// ── 推送記錄 ──────────────────────────────────────────
function renderHist() {
  const el = document.getElementById('hist');
  if (!hist.length) {
    el.innerHTML = '<p style="color:var(--m);font-size:12px;text-align:center;padding:12px">尚無記錄</p>';
    return;
  }
  el.innerHTML = hist.map(h => `
    <div class="hi">
      <span><strong>${h.names}</strong> <span style="color:var(--m)">(${h.count}人)</span></span>
      <span style="color:var(--ac2);font-size:11px">${h.time}</span>
    </div>`).join('');
}

// ── Toast ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2200);
}
</script>
</body>
</html>
